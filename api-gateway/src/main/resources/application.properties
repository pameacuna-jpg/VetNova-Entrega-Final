spring.application.name=api-gateway

server.port=8099

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=usuarios-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.server.webmvc.routes[2].id=inventario-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8087
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/v1/productos/**

spring.cloud.gateway.server.webmvc.routes[3].id=notificaciones-service
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8089
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v1/notificaciones/**

spring.cloud.gateway.server.webmvc.routes[4].id=sucursales-service
spring.cloud.gateway.server.webmvc.routes[4].uri=http://localhost:8090
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/v1/sucursales/**