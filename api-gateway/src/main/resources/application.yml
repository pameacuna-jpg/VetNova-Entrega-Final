spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**

            - id: usuarios-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/usuarios/**

            - id: atencion-clinica-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/atenciones/**

            - id: clientes-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/clientes/**

            - id: mascotas-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/mascotas/**

            - id: agenda-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/citas/**

            - id: inventario-productos-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/productos/**

            - id: inventario-movimientos-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/movimientos/**

            - id: inventario-proveedores-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/proveedores/**

            - id: ventas-service
              uri: http://localhost:8088
              predicates:
                - Path=/api/v1/ventas/**

            - id: notificaciones-service
              uri: http://localhost:8089
              predicates:
                - Path=/api/v1/notificaciones/**

            - id: sucursales-service
              uri: http://localhost:8090
              predicates:
                - Path=/api/v1/sucursales/**

            - id: boxes-service
              uri: http://localhost:8090
              predicates:
                - Path=/api/v1/boxes/**

            - id: horarios-service
              uri: http://localhost:8090
              predicates:
                - Path=/api/v1/horarios/**

server:
  port: 8099