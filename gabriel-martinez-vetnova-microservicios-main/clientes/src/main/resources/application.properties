
spring.application.name=clientes

server.port=8084

# CONFIGURACIÓN DE LA BASE DE DATOS (DOCKER MAC)
spring.datasource.url=jdbc:mysql://localhost:3306/vetnova_clientes?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE HIBERNATE Y JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# LOGGING (Para ver el rastro de las HUs en la consola de VS Code)
logging.level.com.vetnova.clientes=DEBUG
logging.level.org.springframework.web=INFO
