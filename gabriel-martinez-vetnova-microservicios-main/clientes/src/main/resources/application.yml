spring:
  application:
    name: clientes

  datasource:
    url: jdbc:mysql://localhost:3306/vetnova_clientes?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ''
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

server:
  port: 8084

logging:
  level:
    com:
      vetnova:
        clientes: DEBUG
    org:
      springframework:
        web: INFO

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

notificaciones:
  url: http://localhost:8089/api/v1/notificaciones