spring:
  application:
    name: atencion-clinica-service

  datasource:
    url: jdbc:mysql://localhost:3306/vetnova_atencion_clinica?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8083

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    org:
      springframework:
        web: INFO
    com:
      vetnova: DEBUG

notificaciones:
  url: http://localhost:8089/api/v1/notificaciones