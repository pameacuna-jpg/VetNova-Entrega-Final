# Nombre del microservicio
spring.application.name=usuarios

# 1. Configuración del Puerto
server.port=8082

# 2. Conexión Estricta a MySQL (Apunta a base de datos db_usuarios)
# El parámetro createDatabaseIfNotExist=true creará la base de datos automáticamente si no existe.
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuarios?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Configuración de JPA y Hibernate
# ddl-auto=update creará las tablas automáticamente basándose en las clases del 'model'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect