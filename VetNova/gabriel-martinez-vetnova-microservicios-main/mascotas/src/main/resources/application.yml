server:
  port: 8085

spring:
  application:
    name: ms-mascotas

  datasource:
    url: jdbc:mysql://localhost:3306/vetnova_mascotas?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

notificaciones:
  url: http://localhost:8089/api/v1/notificaciones

clientes:
  url: http://localhost:8084/api/v1/clientes 