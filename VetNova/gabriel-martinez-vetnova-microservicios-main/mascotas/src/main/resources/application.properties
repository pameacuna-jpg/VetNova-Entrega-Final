server.port=8085

spring.application.name=ms-mascotas

# Configuración de base de datos MySQL en el Docker local
spring.datasource.url=jdbc:mysql://localhost:3306/vetnova_mascotas?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate 7
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true